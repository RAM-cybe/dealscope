[theme]
base = "dark"
backgroundColor = "#05070a"
secondaryBackgroundColor = "#0c0f14"
textColor = "#eef1f4"
primaryColor = "#1fb8a3"
font = "sans serif"

[server]
runOnSave = true

[client]
toolbarMode = "minimal"
showSidebarNavigation = false
# Public app: never render Python tracebacks/internals into the browser on an
# error -- users see a generic message; real detail stays in the server logs.
showErrorDetails = "none"
